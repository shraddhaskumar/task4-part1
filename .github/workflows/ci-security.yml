name: CI Security + Kind Deployment

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task4-part1:latest .

      - name: Create Trivy report directory
        run: mkdir -p trivy-report

      # Use the official Trivy GitHub Action - HTML report
      - name: Scan Docker image - HTML report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/task4-part1:latest
          format: template
          template: "@/contrib/html.tpl"
          output: trivy-report/report.html
          severity: CRITICAL,HIGH
          exit-code: "0"

      # Use the official Trivy GitHub Action - JSON report
      - name: Scan Docker image - JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/task4-part1:latest
          format: json
          output: trivy-report/report.json
          severity: CRITICAL,HIGH
          exit-code: "0"

      # Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/task4-part1:latest

      # Upload reports as GitHub Actions artifact
      - name: Upload Trivy reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-report/report.html
            trivy-report/report.json

      # Commit and push reports back to the repo
      - name: Push Trivy reports to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add trivy-report/report.html trivy-report/report.json
          git commit -m "Add Trivy scan reports [skip ci]" || echo "Nothing to commit"
          git push https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master
